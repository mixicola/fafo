<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <style>
                @font-face{
    font-family:Comic;
    src:url("../../fonts/Comic.ttf")
}
        @font-face{
    font-family:Cute;
    src:url("../../fonts/HowCute-gylP.ttf")
}
h1 {

            font-family:Cute, sans-serif;
            text-align: center;
            color: #333;
            background-color: #e6ccff;
            width: 100%;
            margin-top: auto;
        }
        p {
            font-family:Comic, sans-serif;
            text-align: left;
            color: #333;
        }
footer {
            background-color: #e6ccff;
            width: 100%;
            text-align: center;
            margin-top: auto;
}
        .footer {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
            padding: 10px 12px;
            flex-wrap: wrap;
        }
        .gallery{
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .gallery .item{
            width: calc((100% - 2rem) / 3);
            max-width: 260px;
            box-sizing: border-box;
            text-align: center;
        }

        .gallery img{
            display: block;
            width: 100%;
            height: auto;
            border-radius: 6px;
        }

        @keyframes spin-once {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .gallery img, .Plugs img {
            transform-origin: 50% 50%;
            backface-visibility: hidden;
            will-change: transform;
            animation: spin-once 800ms cubic-bezier(.2,.8,.2,1) 0s both;
        }

        .gallery figcaption{
            font-family:Comic, sans-serif;
            margin-top: 0.5rem;
            font-size: 0.95rem;
            color: #222;
        }
    .Plugs{
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: flex-start;
            flex-wrap: wrap;
            margin: 0 auto;
            padding: 0 1rem;
        }

        .Plugs .item{
            width: calc((100% - 2rem) / 3);
            max-width: 260px;
            box-sizing: border-box;
            text-align: center; 
        }

        .Plugs img{
            display: block;
            width: 100%;
            height: auto;
            border-radius: 6px;
        }

        .Plugs figcaption{
            font-family:Comic, sans-serif;
            margin-top: 0.5rem;
            font-size: 0.95rem;
            color: #222;
        }
        @media (max-width: 700px){
            .gallery .item{ width: 100%; max-width: 640px; }
        }
                
                body {
                                background-color:#83B79C
                }
    </style>
</head>
<body>
    <h1>Heya! Welcome to my site!</h1>

    <main>
        <section class="gallery">
            <figure class="item">
                <img src="artwork/Fish.png" alt="Example Art">
                <figcaption> <a href="gallery">Gallery!</a></figcaption>
            </figure>

            <figure class="item">
                <img src="artwork/Seeder.png" alt="My OC">
                <figcaption> <a href="about">About Me!</a></figcaption>
            </figure>
        </section>
            <h1 style="text-align:center;">Contact Me!</h1>
        <section class="Plugs">
        <figure class="item">
            <img src="artwork/Discord.png" alt="Discord">
            <figcaption>ff8243</figcaption>
        </figure>
        </section>
    </main>
</body>
<footer>
    <div class="footer">
      <p style="color:rgb(82, 7, 76);">&copy; 2025</p>   
      <p style="color:rgb(82, 7, 76);"><a style="color:rgb(118, 6, 62); text-align:center;" href="homepage">Home</a></p>
        <p style="color:rgb(82, 7, 76);"><a style="color:rgb(118, 6, 62); text-align:center;" href="about">About Me</a></p>
    </div>
  </footer>
</html>
