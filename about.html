<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Me</title>
    <style>
                @font-face{
    font-family:Comic;
    src:url("../../fonts/Comic.ttf")}
        @font-face{
    font-family:Cute;
    src:url("../../fonts/HowCute-gylP.ttf")}

        :root{
            --bg-1: #fff7ff;
            --bg-2: #f0f8ff;
            --card-bg: #ffd6ea;
            --accent: #b86ef6;
        }

    html, body { height: 100%; }
    body {
            margin: 0;
            padding: 24px;
            font-family: Comic, Arial, sans-serif;
            background-color: aliceblue;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            animation-name: rainbow-cycle;
            animation-duration: 10s; 
            animation-iteration-count: infinite;
            animation-timing-function: linear; 
        }

    h1 {
            font-family:Cute, sans-serif;
            text-align: center;
            color: #333;
            background: linear-gradient(90deg,#fff2ff,#e6ccff);
            width: 100%;
            padding: 10px 0;
            border-radius: 10px;
            margin: 0;
            max-width: 1100px;
        }

    .container {
        display: flex;
        align-items: center; 
        justify-content: space-between; 
        gap: 24px; 
        padding: 18px; 
        margin: 0 auto; 
        max-width: 1100px;
        width: calc(100% - 48px);
    }

    p {
            color: #333;
            overflow-wrap: break-word;
            font-size: clamp(16px, 2.6vw, 20px);
            line-height: 1.6;
            margin: 0;
        }

    .text-block {
        flex: 1;
        min-width: 0;
        text-align: left;
        padding: 18px 22px;
        background: var(--card-bg);
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.06);
    }

    .image-container {
        flex: 0 0 420px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .image-container img {
        width: 100%;
        max-width: 420px;
        height: auto;
        display: block;
        border-radius: 12px;
        box-shadow: 0 12px 30px rgba(0,0,0,0.08);
        transition: transform 220ms cubic-bezier(.2,.8,.2,1), filter 220ms;
        transform-origin: center center;
    }

    .image-container:hover img, .image-container:focus-within img { transform: translateY(-6px) scale(1.03); filter:brightness(1.02); }

@media (max-width: 820px) {
    .container {
        flex-direction: column; 
        padding: 12px;
    }

    .image-container { flex: 0 0 auto; width: 80%; }
    .text-block { padding: 14px; }
}

@keyframes rainbow-cycle {
0%   { background-color: #ffadad; }
  14%  { background-color: #ffd6a5; } 
  28%  { background-color: #fdffb6; } 
  42%  { background-color: #caffbf; } 
  56%  { background-color: #9bf6ff; } 
  70%  { background-color: #a0c4ff; } 
  84%  { background-color: #bdb2ff; }
  100% { background-color: #ffadad; }
}
        footer {
            background-color: #e6ccff;
            width: 100%;
            text-align: center;
            margin-top: auto;
        }
        .footer {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            gap: 16px;
            justify-content: center;
            align-items: center;
            padding: 10px 12px;
            flex-wrap: wrap;
        }
</style>
</head>
<body>
    <h1 style="text-align:center;">About Me!</h1>
<div class="container">

        </div>
    </div>
    <br>
    <div class="container">

            <img src="artwork/Seed.png" alt="Seed character">
        </div>

        </div>

                <p style="color:rgb(82, 7, 76);"><a style="color:rgb(118, 6, 62); text-align:center;" href="about">About Me</a></p>

</html>
