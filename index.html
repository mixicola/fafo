<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAFO - Home</title>
    <style>
        @font-face {
            font-family: 'I Am The Crayon Master';
            src: url('IAmTheCrayonMaster.ttf') format('truetype');
        }

        * {
            box-sizing: border-box;
        }

        body {
            background-color: #83B79C;
            font-family: 'I Am The Crayon Master', 'Comic Sans MS', cursive;
            margin: 0;
            padding: 20px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            background-color: #e6ccff;
            width: 100%;
            max-width: 1400px;
            text-align: center;
            padding: 20px 0;
            border-radius: 18px;
            margin: 0 0 30px 0;
            font-size: 3rem;
        }

        .gallery {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 50px;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1200px;
        }

        .char-container {
            width: 320px;
            text-align: center;
            cursor: pointer;
            padding: 10px;
        }

        .image-frame {
            width: 320px;
            height: 320px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .icon-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            border-radius: 10px;
        }

        .char-name {
            margin-top: 18px;
            font-size: 2rem;
        }

        .ref-content {
            display: none;
            margin-top: 20px;
            width: 100%;
        }

        .ref-content.show {
            display: block;
        }

        .ref-frame {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        .ref-content img {
            width: 100%;
            max-width: 320px;
            height: auto;
            object-fit: contain;
            display: block;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
        }

        .credit {
            margin-top: 50px;
            font-size: 1.2rem;
            background: #e6ccff;
            padding: 12px 28px;
            border-radius: 30px;
            font-weight: bold;
            text-align: center;
        }

        @media (max-width: 700px) {
            h1 {
                font-size: 2.2rem;
                padding: 16px 0;
            }

            .char-container {
                width: 90vw;
                max-width: 320px;
            }

            .image-frame {
                width: 90vw;
                max-width: 320px;
                height: 90vw;
                max-height: 320px;
            }

            .char-name {
                font-size: 1.7rem;
            }
        }
    </style>
</head>
<body>

    <h1>FAFO</h1>

    <div class="gallery">
        <div class="char-container" onclick="toggleRef('aspen-ref')">
            <div class="image-frame">
                <img src="artwork/AspenICON.png" alt="Aspen" class="icon-img">
            </div>
            <p class="char-name">Aspen</p>
            <div id="aspen-ref" class="ref-content">
                <div class="ref-frame">
                    <img src="artwork/AspenREF.png" alt="Aspen Reference">
                </div>
            </div>
        </div>

        <div class="char-container" onclick="toggleRef('lou-ref')">
            <div class="image-frame">
                <img src="artwork/lou.png" alt="Lou" class="icon-img">
            </div>
            <p class="char-name">Lou</p>
            <div id="lou-ref" class="ref-content">
                <div class="ref-frame">
                    <img src="artwork/LouREF.png" alt="Lou Reference">
                </div>
            </div>
        </div>
    </div>

    <div class="credit">Art by Mixicola</div>

    <script>
        function toggleRef(id) {
            const clickedRef = document.getElementById(id);
            const allRefs = document.querySelectorAll('.ref-content');

            allRefs.forEach(ref => {
                if (ref !== clickedRef) {
                    ref.classList.remove('show');
                }
            });

            clickedRef.classList.toggle('show');
        }
    </script>

</body>
</html>
